version: '3.8'

services:
  mongodb:
    image: mongo:7.0
    container_name: shareway-mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: shareway_secret
      MONGO_INITDB_DATABASE: shareway
    volumes:
      - mongo_data:/data/db
      - ./docker/mongo-init.js:/docker-entrypoint-initdb.d/mongo-init.js:ro
    ports:
      - "27017:27017"
    networks:
      - shareway-net
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 40s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: shareway-backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 5000
      MONGODB_URI: mongodb://admin:shareway_secret@mongodb:27017/shareway?authSource=admin
      JWT_SECRET: ${JWT_SECRET:-super_secret_jwt_key_change_in_production_xyz}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-refresh_secret_key_change_in_production_abc}
      JWT_EXPIRE: 7d
      FRONTEND_URL: http://localhost
      RATE_LIMIT_WINDOW: 15
      RATE_LIMIT_MAX: 200
    volumes:
      - backend_uploads:/app/uploads
      - backend_logs:/app/logs
    ports:
      - "5000:5000"
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - shareway-net
    healthcheck:
      test: node -e "require('http').get('http://localhost:5000/health', r => process.exit(r.statusCode === 200 ? 0 : 1))"
      interval: 30s
      timeout: 5s
      retries: 3

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: shareway-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - shareway-net

volumes:
  mongo_data:
    driver: local
  backend_uploads:
    driver: local
  backend_logs:
    driver: local

networks:
  shareway-net:
    driver: bridge
